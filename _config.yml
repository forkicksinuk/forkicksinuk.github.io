# 站点基本信息
title: JIUZHE BLOG
description: "live,laugh,love"
url: "https://forkicks.fun"
baseurl: ""  # 如果您的网站部署在子目录下，请填写子目录路径，否则留空

# 作者信息
author:
  name: 就这
  email: jiuzhey666@gmail.com
  bio: "热爱技术和分享的开发者"

# 社交媒体设置
github_username: forkicksinuk

# 侧边栏设置
sidebar: true
sidebar-about-description: "live,laugh,love"

# 构建设置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM  # 使用 GitHub 风格的 Markdown
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# 分页设置
paginate: 10  # 每页显示的文章数
paginate_path: "/page:num/"

# 插件
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# 排除文件和文件夹
exclude:
  - less
  - node_modules
  - Gruntfile.js
  - package.json
  - README.md
  - .gitignore

# 永久链接设置
permalink: /:year/:month/:day/:title/

# SEO 设置
twitter:
  username: jiuzhe
  card: summary
logo: /assets/images/logo.png
social:
  name: 就这
  links:
    - https://github.com/forkicksinuk

# 其他设置
timezone: Asia/Shanghai
encoding: utf-8
future: true

# Google Analytics（可选）
# google_analytics: UA-XXXXXXXX-X

# 评论系统设置（可选）
# disqus:
#   shortname: your-disqus-shortname

# 站点地图设置
defaults:
  -
    scope:
      path: ""
    values:
      sitemap: true
