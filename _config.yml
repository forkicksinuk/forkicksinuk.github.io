# Site settings
title: ForKicksInUK
description: 记录学习和生活
author: ForKicksInUK

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: "/page:num/"

# Social media
github_username: forkicksinuk
twitter_username: your_twitter_username

# Google Analytics
google_analytics: G-XXXXXXXXXX  # Replace with your Google Analytics tracking ID

# Disqus Comments
disqus_shortname: your-disqus-shortname  # Replace with your Disqus shortname

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO settings
lang: zh
timezone: Asia/Shanghai
url: "https://forkicksinuk.github.io"  # Replace with your site URL
baseurl: ""

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
