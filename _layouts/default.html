<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- SEO Tags -->
    {% seo %}
    
    <!-- Feed -->
    {% feed_meta %}

    <!-- 样式表 -->
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | absolute_url }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | absolute_url }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ '/assets/images/favicon.ico' | absolute_url }}" type="image/x-icon">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>

<body>
    <!-- 页头 -->
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">
                <a href="{{ '/' | absolute_url }}">{{ site.title }}</a>
            </h1>
            <p class="site-description">{{ site.description }}</p>
            
            <!-- 导航菜单 -->
            <nav class="site-nav">
                <ul>
                    <li><a href="{{ '/' | absolute_url }}">首页</a></li>
                    <li><a href="{{ '/tags' | absolute_url }}">标签</a></li>
                    <li><a href="{{ '/about' | absolute_url }}">关于</a></li>
                </ul>
            </nav>
        </div>
        <button id="theme-toggle"></button>
    </header>

    <!-- 主体内容 -->
    <main class="site-main container">
        {{ content }}
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="container">
            <p class="copyright">
                &copy; {{ site.time | date: "%Y" }} {{ site.author.name }}. All rights reserved.
            </p>
            {% if site.github_username %}
            <div class="social-links">
                <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-github"></i>
                </a>
            </div>
            {% endif %}
        </div>
    </footer>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" title="返回顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- JavaScript -->
    <script>
        // 返回顶部按钮
        const backToTopButton = document.getElementById('back-to-top');
        
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 100) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        });

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // 代码复制功能
        document.addEventListener('DOMContentLoaded', function() {
            // 为每个代码块添加复制按钮
            document.querySelectorAll('pre').forEach(function(preBlock) {
                // 创建复制按钮
                var copyButton = document.createElement('button');
                copyButton.className = 'copy-button';
                copyButton.innerHTML = '<i class="fas fa-copy"></i>';
                
                // 将pre块包装在一个相对定位的容器中
                var wrapper = document.createElement('div');
                wrapper.className = 'code-wrapper';
                preBlock.parentNode.insertBefore(wrapper, preBlock);
                wrapper.appendChild(preBlock);
                wrapper.appendChild(copyButton);

                // 添加点击事件
                copyButton.addEventListener('click', function() {
                    var codeBlock = preBlock.querySelector('code') || preBlock;
                    var code = codeBlock.textContent;
                    
                    navigator.clipboard.writeText(code).then(function() {
                        // 更改按钮状态
                        copyButton.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(function() {
                            copyButton.innerHTML = '<i class="fas fa-copy"></i>';
                        }, 2000);
                    }).catch(function(err) {
                        console.error('Failed to copy text: ', err);
                    });
                });
            });
        });
    </script>
    <script src="/assets/js/"></script>
</body>
</html>
